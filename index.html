<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Gabriel ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(#12031f,#31114b,#ff6fa5);
overflow-x:hidden;
color:white;
text-align:center;
}

/* ESTRELAS */

.stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
overflow:hidden;
z-index:-1;
}

.star{
position:absolute;
background:white;
width:3px;
height:3px;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{
opacity:.2;
transform:scale(.5);
}
to{
opacity:1;
transform:scale(1.3);
}
}

/* TELA INICIAL */

#inicio{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

#inicio h1{
font-size:38px;
margin-bottom:20px;
}

#inicio p{
font-size:20px;
margin-bottom:30px;
}

/* CORAÇÃO */

.heart{

width:120px;
height:120px;

background:#ff2f74;

transform:rotate(-45deg);

animation:pulse 1s infinite;

cursor:pointer;

position:relative;

}

.heart:before,
.heart:after{

content:"";

position:absolute;

width:120px;
height:120px;

background:#ff2f74;

border-radius:50%;

}

.heart:before{

top:-60px;

left:0;

}

.heart:after{

left:60px;

top:0;

}

@keyframes pulse{

0%{transform:rotate(-45deg) scale(1);}

50%{transform:rotate(-45deg) scale(1.15);}

100%{transform:rotate(-45deg) scale(1);}

}

#conteudo{

display:none;

padding:40px 20px;

}

h2{

margin-top:20px;

margin-bottom:20px;

font-size:34px;

}

</style>

</head>

<body>

<div class="stars" id="stars"></div>

<section id="inicio">

<h1>Para o amor da minha vida ❤️</h1>

<p>Gabriel</p>

<div class="heart" onclick="abrirCarta()"></div>

<p style="margin-top:40px;">Clique no coração</p>

</section>

<section id="conteudo">

<h2>Nossa História 💕</h2>
